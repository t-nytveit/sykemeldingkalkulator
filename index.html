<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sykemeldingskalkulator</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%2318961e'/><text x='90' y='125' font-family='Arial, sans-serif' font-weight='bold' font-size='100' fill='white' text-anchor='middle'>%25</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%2318961e'/><text x='90' y='125' font-family='Arial, sans-serif' font-weight='bold' font-size='100' fill='white' text-anchor='middle'>%25</text></svg>">

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
        }

        h2 { 
            color: #333; 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.2rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .input-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: #444; 
            font-size: 0.9rem; 
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fcfcfc;
            -webkit-appearance: none;
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none; 
            background-color: #fff; 
        }

        .result-box {
            background: #f1f9f1;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 25px;
            border: 1px solid #d4ecd5;
        }

        .result-label { 
            font-size: 0.95rem; 
            color: #444; 
            margin-bottom: 8px; 
        }

        .result-value { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: var(--primary); 
        }

        .sub-result { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-top: 10px; 
        }

        .copyright {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Kalkulator</h2>
    
    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Sykemeldingsprosent (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Timer i full uke (100%)</label>
        <input type="number" id="fullUke" value="37.5" step="0.5" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="result-box">
        <div class="result-label">Timer du skal jobbe pr. uke:</div>
        <div id="result" class="result-value">22,50</div>
        <div class="sub-result">
            Din restarbeidsevne: <strong><span id="restProsent">60</span>%</strong>
        </div>
    </div>

    <div class="copyright">
        &copy; <span id="year"></span> Copyright Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        const fullUke = parseFloat(document.getElementById('fullUke').value) || 37.5;

        const restArbeidsevneFaktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timerSkalJobbe = restArbeidsevneFaktor * fullUke;
        const restVisning = restArbeidsevneFaktor * 100;

        document.getElementById('restProsent').innerText = restVisning.toFixed(1).replace('.', ',');
        document.getElementById('result').innerText = timerSkalJobbe.toLocaleString('no-NO', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
    }
    calculate();
</script>

</body>
</html>
