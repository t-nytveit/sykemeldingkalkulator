<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sykemeldingskalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    <link rel="apple-touch-icon" href="k_icon.png">
    <link rel="icon" type="image/png" href="k_icon.png">

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
            --light-grey: #f8f9fa;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; color: #444; font-size: 0.85rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }

        .week-viz { display: flex; justify-content: space-between; margin: 15px 0; }
        .day-circle {
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; color: #999; position: relative; overflow: hidden;
        }
        .day-fill { position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--primary); opacity: 0.3; transition: height 0.5s ease; }

        .result-box {
            background: #f1f9f1; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; border: 1px solid #d4ecd5;
        }
        .result-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .result-detail { font-size: 0.85rem; color: #444; margin-bottom: 10px; }

        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.5s ease; }

        .btn-archive {
            background-color: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 0.9rem;
        }

        .archive-section { margin-top: 30px; }
        .archive-item {
            background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 10px;
            font-size: 0.8rem; display: flex; justify-content: space-between; align-items: flex-start;
            cursor: pointer; transition: background 0.2s;
        }
        .archive-item:hover { background: #f9fdf9; border-color: var(--primary); }
        
        .archive-content { flex-grow: 1; line-height: 1.5; }
        .btn-delete { color: #dc3545; border: none; background: none; cursor: pointer; font-size: 1.2rem; margin-left: 10px; padding: 5px; }

        .info-text { font-size: 0.8rem; color: #555; background: var(--light-grey); padding: 12px; border-radius: 8px; margin-top: 15px; line-height: 1.5; border-left: 4px solid var(--primary); }

        .copyright { margin-top: 25px; text-align: center; font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Kalkulator</h2>
    
    <div class="section-title">Arbeidstid</div>
    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>
    <div class="input-group">
        <label>Sykemeldingsprosent (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>
    <div class="input-group">
        <label>Timer i full uke (100%)</label>
        <input type="number" id="fullUke" value="37.5" step="0.5" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="section-title">Ukesoversikt (Arbeidsevne)</div>
    <div class="week-viz">
        <div class="day-circle"><div class="day-fill" id="fill-0"></div>M</div>
        <div class="day-circle"><div class="day-fill" id="fill-1"></div>T</div>
        <div class="day-circle"><div class="day-fill" id="fill-2"></div>O</div>
        <div class="day-circle"><div class="day-fill" id="fill-3"></div>T</div>
        <div class="day-circle"><div class="day-fill" id="fill-4"></div>F</div>
        <div class="day-circle"><div class="day-fill" id="fill-5"></div>L</div>
        <div class="day-circle"><div class="day-fill" id="fill-6"></div>S</div>
    </div>

    <div class="section-title">Periode</div>
    <div class="input-group"><label>Startdato</label><input type="date" id="startDate" oninput="calculate()"></div>
    <div class="input-group"><label>Sluttdato</label><input type="date" id="endDate" oninput="calculate()"></div>

    <div class="result-box">
        <div class="result-label">Timer å jobbe pr. uke:</div>
        <div id="result" class="result-value">0,00</div>
        <div id="resultTimeFormat" class="result-detail">(0t 0m)</div>
        
        <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        <div id="progressLabel" style="font-size: 0.7rem; font-weight: bold; color: var(--primary);">0% fullført</div>
    </div>

    <button class="btn-archive" onclick="archivePeriod()">Arkiver denne perioden</button>

    <div id="statusInfo" class="info-text" style="display:none;"></div>

    <div class="archive-section">
        <div class="section-title">Arkiverte perioder (Trykk for å vise)</div>
        <div id="archiveList"></div>
    </div>

    <div class="copyright">
        &copy; <span id="year"></span> Copyright Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    window.onload = function() {
        const fields = ['stilling', 'sykemelding', 'fullUke', 'startDate', 'endDate'];
        fields.forEach(field => {
            const saved = localStorage.getItem('haga_' + field);
            if (saved && document.getElementById(field)) {
                document.getElementById(field).value = saved;
            }
        });
        renderArchive();
        calculate();
    };

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        const fullUke = parseFloat(document.getElementById('fullUke').value) || 37.5;
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;

        localStorage.setItem('haga_stilling', stilling);
        localStorage.setItem('haga_sykemelding', sykemelding);
        localStorage.setItem('haga_fullUke', fullUke);
        localStorage.setItem('haga_startDate', startVal);
        localStorage.setItem('haga_endDate', endVal);

        const restArbeidsevneFaktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timerUke = restArbeidsevneFaktor * fullUke;
        
        const h = Math.floor(timerUke);
        const m = Math.round((timerUke - h) * 60);
        
        document.getElementById('result').innerText = timerUke.toLocaleString('no-NO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resultTimeFormat').innerText = `(${h} timer og ${m} minutter)`;

        const restProsent = restArbeidsevneFaktor * 100;
        for(let i=0; i<7; i++) {
            document.getElementById(`fill-${i}`).style.height = restProsent + '%';
        }

        const statusBox = document.getElementById('statusInfo');
        if (startVal && endVal) {
            const start = new Date(startVal);
            const end = new Date(endVal);
            const today = new Date();
            today.setHours(0,0,0,0);

            const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
            let effectiveStartDate = start;

            let foundLink = true;
            let currentCheckDate = start;
            while(foundLink) {
                const prevPeriod = archive.find(p => {
                    const pEnd = new Date(p.end);
                    const diffDays = (currentCheckDate - pEnd) / (1000 * 60 * 60 * 24);
                    return diffDays >= 0 && diffDays < 16;
                });
                if(prevPeriod) {
                    effectiveStartDate = new Date(prevPeriod.start);
                    currentCheckDate = effectiveStartDate;
                } else {
                    foundLink = false;
                }
            }

            let agEnd = new Date(effectiveStartDate);
            agEnd.setDate(effectiveStartDate.getDate() + 15);
            
            const total = end - start;
            const current = today - start;
            let percent = total > 0 ? Math.min(100, Math.max(0, Math.round((current / total) * 100))) : 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressLabel').innerText = percent + '% fullført';
            
            statusBox.style.display = 'block';
            let msg = today > agEnd 
                ? "✅ Arbeidsgiverperioden er over (basert på sammenhengende fravær)." 
                : `⏳ Arbeidsgiver betaler til ${agEnd.toLocaleDateString('nb-NO')}.`;
            
            if (effectiveStartDate.getTime() !== start.getTime()) {
                msg += `<br><small><i>(Forløp startet: ${effectiveStartDate.toLocaleDateString('nb-NO')})</i></small>`;
            }
            statusBox.innerHTML = msg;
        } else { statusBox.style.display = 'none'; }
    }

    function archivePeriod() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const grad = document.getElementById('sykemelding').value;
        const stilling = document.getElementById('stilling').value;
        const fullUke = document.getElementById('fullUke').value;
        const timeText = document.getElementById('resultTimeFormat').innerText;

        if(!start || !end) return alert("Velg datoer først!");

        const entry = { 
            id: Date.now(), 
            start, 
            end, 
            grad, 
            stilling,
            fullUke,
            timeInfo: timeText.replace('(', '').replace(')', '') 
        };

        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive.unshift(entry);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        renderArchive();
        calculate();
    }

    // NY FUNKSJON: Lastet fra arkiv til kalkulator
    function loadFromArchive(id) {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const entry = archive.find(item => item.id === id);
        
        if (entry) {
            document.getElementById('startDate').value = entry.start;
            document.getElementById('endDate').value = entry.end;
            document.getElementById('sykemelding').value = entry.grad;
            document.getElementById('stilling').value = entry.stilling;
            if (entry.fullUke) document.getElementById('fullUke').value = entry.fullUke;
            
            calculate();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function renderArchive() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const list = document.getElementById('archiveList');
        list.innerHTML = archive.map(item => `
            <div class="archive-item" onclick="loadFromArchive(${item.id})">
                <div class="archive-content">
                    <strong>${item.grad}% Sykemeldt</strong> (${item.stilling}% stilling)<br>
                    📅 ${new Date(item.start).toLocaleDateString('nb-NO')} - ${new Date(item.end).toLocaleDateString('nb-NO')}<br>
                    🕒 Jobbe: ${item.timeInfo}
                </div>
                <button class="btn-delete" onclick="event.stopPropagation(); deleteArchive(${item.id})">&times;</button>
            </div>
        `).join('');
    }

    function deleteArchive(id) {
        if(!confirm("Slette denne perioden fra arkivet?")) return;
        let archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive = archive.filter(item => item.id !== id);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        renderArchive();
        calculate();
    }
</script>
</body>
</html>
