<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sykemeldingskalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">

    <link rel="apple-touch-icon" href="k_icon.png">
    <link rel="icon" type="image/png" href="k_icon.png">

    <style>
        :root {
            --primary: #18961e; /* KIWI-grønn fargeprofil */
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
            --light-grey: #f8f9fa;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h2 { 
            color: #333; 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.1rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .input-group { margin-bottom: 12px; }

        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: 600; 
            color: #444; 
            font-size: 0.85rem; 
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fcfcfc;
            -webkit-appearance: none;
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none; 
            background-color: #fff; 
        }

        /* Resultat-seksjon */
        .result-box {
            background: #f1f9f1;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid #d4ecd5;
        }

        .result-label { font-size: 0.9rem; color: #444; margin-bottom: 5px; }
        .result-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .result-detail { font-size: 0.95rem; color: #444; font-weight: 500; margin-top: -5px; margin-bottom: 10px; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 10px;
            height: 10px;
            margin: 10px 0 5px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        .info-text {
            font-size: 0.8rem;
            color: #555;
            background: var(--light-grey);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            line-height: 1.4;
        }

        .copyright {
            margin-top: 25px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Kalkulator</h2>
    
    <div class="section-title">Arbeidstid</div>
    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Sykemeldingsprosent (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Timer i full uke (100%)</label>
        <input type="number" id="fullUke" value="37.5" step="0.5" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="section-title">Periode & Status</div>
    <div class="input-group">
        <label>Startdato sykemelding</label>
        <input type="date" id="startDate" oninput="calculate()">
    </div>
    <div class="input-group">
        <label>Sluttdato sykemelding</label>
        <input type="date" id="endDate" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-label">Timer du skal jobbe pr. uke:</div>
        <div id="result" class="result-value">0,00</div>
        <div id="resultTimeFormat" class="result-detail">(0 timer og 0 minutter)</div>
        
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressLabel" style="font-size: 0.75rem; font-weight: bold; color: var(--primary);">0% fullført</div>
    </div>

    <div id="statusInfo" class="info-text" style="display:none;"></div>

    <div class="copyright">
        &copy; <span id="year"></span> Copyright Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    window.onload = function() {
        const fields = ['stilling', 'sykemelding', 'fullUke', 'startDate', 'endDate'];
        fields.forEach(field => {
            const saved = localStorage.getItem('haga_' + field);
            if (saved) document.getElementById(field).value = saved;
        });
        calculate();
    };

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        const fullUke = parseFloat(document.getElementById('fullUke').value) || 37.5;
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;

        // Lagre verdier
        localStorage.setItem('haga_stilling', stilling);
        localStorage.setItem('haga_sykemelding', sykemelding);
        localStorage.setItem('haga_fullUke', fullUke);
        localStorage.setItem('haga_startDate', startVal);
        localStorage.setItem('haga_endDate', endVal);

        // 1. Regn ut timer desimal
        const restArbeidsevneFaktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timerSkalJobbeDesimal = restArbeidsevneFaktor * fullUke;
        
        // Oppdater desimalvisning
        document.getElementById('result').innerText = timerSkalJobbeDesimal.toLocaleString('no-NO', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });

        // 2. Regn om til timer og minutter
        const timerHeltall = Math.floor(timerSkalJobbeDesimal);
        const minutter = Math.round((timerSkalJobbeDesimal - timerHeltall) * 60);
        document.getElementById('resultTimeFormat').innerText = `(${timerHeltall} timer og ${minutter} minutter)`;

        // 3. Dato-beregninger og Progress Bar
        const statusBox = document.getElementById('statusInfo');
        if (startVal && endVal) {
            const start = new Date(startVal);
            const end = new Date(endVal);
            const today = new Date();
            today.setHours(0,0,0,0);

            let agEnd = new Date(start);
            agEnd.setDate(start.getDate() + 15);

            const total = end - start;
            const current = today - start;
            let percent = 0;
            if (total > 0) {
                percent = Math.min(100, Math.max(0, Math.round((current / total) * 100)));
            }
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressLabel').innerText = percent + '% fullført';

            statusBox.style.display = 'block';
            let agStatus = today > agEnd 
                ? "✅ Arbeidsgiverperioden er over. NAV dekker nå sykepenger." 
                : `⏳ Arbeidsgiver betaler frem til ${agEnd.toLocaleDateString('nb-NO')}.`;
            
            statusBox.innerHTML = `${agStatus}<br><br><strong>Husk:</strong> Søknad om sykepenger kan sendes tidligst ${end.toLocaleDateString('nb-NO')}.`;
        } else {
            statusBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
