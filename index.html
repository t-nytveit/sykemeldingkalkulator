<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sykemeldingskalkulator Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
            --light-grey: #f8f9fa;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container {
            background: var(--card); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 440px;
            display: flex; flex-direction: column;
        }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { max-width: 140px; height: auto; }
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .trend-alert {
            background-color: #fff3cd; border-left: 5px solid var(--warning);
            color: #856404; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            font-size: 0.85rem; display: none; line-height: 1.4;
        }

        .section-title {
            font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
            margin: 12px 0 6px 0; border-bottom: 1px solid #eee; padding-bottom: 3px;
        }

        .input-group { margin-bottom: 8px; }
        label { display: block; margin-bottom: 2px; font-weight: 600; color: #444; font-size: 0.75rem; }
        input, select {
            width: 100%; padding: 10px; border: 1.5px solid #dee2e6; border-radius: 8px;
            font-size: 15px; box-sizing: border-box; background-color: #fcfcfc;
        }

        .week-viz { display: flex; justify-content: space-between; margin: 10px 0; }
        .day-circle {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; color: #777; position: relative; overflow: hidden;
            background: #fff;
        }
        .day-fill { position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--primary); opacity: 0.3; transition: height 0.4s ease; }

        .result-box {
            background: #f1f9f1; padding: 15px; border-radius: 12px; text-align: center; margin-top: 5px; border: 1px solid #d4ecd5;
        }
        .result-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .info-text { font-size: 0.8rem; color: #555; background: var(--light-grey); padding: 10px; border-radius: 8px; margin-top: 10px; line-height: 1.4; border-left: 4px solid var(--primary); }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 8px; font-weight: bold; display: none; padding: 8px; background: #fff1f1; border-radius: 6px; border-left: 4px solid var(--danger); }

        .btn-main {
            background-color: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.9rem;
        }
        .btn-main:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.7; }
        
        .btn-pdf {
            background-color: #333; color: white; border: none; padding: 10px;
            border-radius: 8px; cursor: pointer; margin-top: 8px; font-size: 0.8rem; font-weight: 600;
        }

        .archive-item {
            background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px;
            margin-bottom: 8px; font-size: 0.8rem; position: relative; cursor: pointer; transition: 0.2s;
        }
        .archive-item:hover { border-color: var(--primary); background: #f9fdf9; }
        .btn-delete-item {
            position: absolute; right: 8px; top: 10px; background: none; border: none;
            color: var(--danger); font-size: 1.2rem; cursor: pointer; padding: 5px; z-index: 2;
        }

        .copyright { margin-top: 25px; text-align: center; font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <div id="trendWarning" class="trend-alert"></div>

    <h2>Personalverktøy</h2>
    
    <div class="section-title">Brukerinformasjon</div>
    <div class="input-group"><label>Navn ansatt</label><input type="text" id="userName" oninput="saveUserData()"></div>
    <div class="input-group"><label>Butikk / Avdeling</label><input type="text" id="userStore" oninput="saveUserData()"></div>

    <div class="section-title">Fravær</div>
    <div class="input-group">
        <select id="fraværType" onchange="calculate()">
            <option value="Sykemelding">Sykemelding (Legeerklært)</option>
            <option value="Egenmelding">Egenmelding (Egen sykdom)</option>
            <option value="Sykt barn">Egenmelding (Sykt barn)</option>
        </select>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex:1;"><label>Stilling %</label><input type="number" id="stilling" value="100" oninput="calculate()"></div>
        <div id="gradInputGroup" class="input-group" style="flex:1;"><label>Syke %</label><input type="number" id="sykemelding" value="40" oninput="calculate()"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex:1;"><label>Start</label><input type="date" id="startDate" oninput="calculate()"></div>
        <div class="input-group" style="flex:1;"><label>Slutt</label><input type="date" id="endDate" oninput="calculate()"></div>
    </div>
    
    <div id="dateError" class="error-msg">⚠️ Sluttdato er før startdato!</div>
    <div id="ruleError" class="error-msg">⚠️ 16-dagers karantene for egenmelding.</div>
    <div id="durationError" class="error-msg">⚠️ Maks 3 dager på egenmelding.</div>

    <div class="week-viz">
        <div class="day-circle"><div class="day-fill" id="fill-0"></div>M</div>
        <div class="day-circle"><div class="day-fill" id="fill-1"></div>T</div>
        <div class="day-circle"><div class="day-fill" id="fill-2"></div>O</div>
        <div class="day-circle"><div class="day-fill" id="fill-3"></div>T</div>
        <div class="day-circle"><div class="day-fill" id="fill-4"></div>F</div>
        <div class="day-circle"><div class="day-fill" id="fill-5"></div>L</div>
        <div class="day-circle"><div class="day-fill" id="fill-6"></div>S</div>
    </div>

    <div class="result-box">
        <div id="result" class="result-value">0,00</div>
        <div id="resultTimeFormat" style="font-size: 0.8rem; color: #444;">(0t 0m pr. uke)</div>
        <div id="dayCount" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;"></div>
    </div>

    <div id="agPeriodInfo" class="info-text" style="display:none;"></div>

    <button id="archiveBtn" class="btn-main" onclick="archivePeriod()">Arkiver periode</button>
    <button class="btn-pdf" onclick="exportToPDF()">Generer PDF-rapport</button>

    <div class="archive-section">
        <div class="section-title">Arkiv (Trykk for å se detaljer)</div>
        <div id="archiveList"></div>
    </div>

    <div class="copyright">&copy; <span id="year"></span> Thomas Nytveit</div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    window.onload = function() {
        ['stilling', 'sykemelding', 'startDate', 'endDate', 'fraværType', 'userName', 'userStore'].forEach(f => {
            const v = localStorage.getItem('haga_' + f);
            if (v) document.getElementById(f).value = v;
        });
        checkTrends(); renderArchive(); calculate();
    };

    function saveUserData() {
        localStorage.setItem('haga_userName', document.getElementById('userName').value);
        localStorage.setItem('haga_userStore', document.getElementById('userStore').value);
    }

    function calculate() {
        const type = document.getElementById('fraværType').value;
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = (type === 'Sykemelding') ? (parseFloat(document.getElementById('sykemelding').value) || 0) : 100;
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        
        document.getElementById('gradInputGroup').style.display = (type === 'Sykemelding') ? 'block' : 'none';
        
        const start = new Date(startVal); const end = new Date(endVal);
        const isDateInvalid = startVal && endVal && (end < start);
        document.getElementById('dateError').style.display = isDateInvalid ? 'block' : 'none';

        if(startVal && endVal && !isDateInvalid) {
            const d = Math.ceil((end - start) / 86400000) + 1;
            document.getElementById('dayCount').innerText = `Perioden utgjør ${d} dag(er)`;
        } else { document.getElementById('dayCount').innerText = ""; }

        let isDurationInvalid = false;
        if (type === 'Egenmelding' && startVal && endVal) {
            if ((Math.ceil((end - start) / 86400000) + 1) > 3) isDurationInvalid = true;
        }
        document.getElementById('durationError').style.display = isDurationInvalid ? 'block' : 'none';

        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');

        let isRuleInvalid = false;
        if (type === 'Egenmelding' && startVal) {
            const last = archive.find(p => p.type !== 'Sykt barn');
            if (last) {
                const diff = (new Date(startVal) - new Date(last.end)) / 86400000;
                if (diff >= 0 && diff < 16) isRuleInvalid = true;
            }
        }
        document.getElementById('ruleError').style.display = isRuleInvalid ? 'block' : 'none';
        document.getElementById('archiveBtn').disabled = isDateInvalid || isDurationInvalid || isRuleInvalid;

        // BEREGNING AV ARBEIDSGIVERPERIODE (HENSTYNSTOK ARKIV)
        const agBox = document.getElementById('agPeriodInfo');
        if(type === 'Sykemelding' && startVal && !isDateInvalid) {
            // Finn historisk start (første dag i sammenhengende fravær)
            let currentChainStart = new Date(start);
            let checkNext = true;
            let tempArchive = [...archive].sort((a,b) => new Date(b.start) - new Date(a.start));

            while(checkNext) {
                let previous = tempArchive.find(p => {
                    let pEnd = new Date(p.end);
                    let gap = (currentChainStart - pEnd) / 86400000;
                    return p.type !== 'Sykt barn' && gap >= 0 && gap < 16;
                });
                if(previous) {
                    currentChainStart = new Date(previous.start);
                } else {
                    checkNext = false;
                }
            }

            let agEnd = new Date(currentChainStart); 
            agEnd.setDate(currentChainStart.getDate() + 15);
            
            agBox.style.display = 'block';
            if (currentChainStart.getTime() !== start.getTime()) {
                agBox.innerHTML = `<strong>Arbeidsgiverperioden:</strong><br>Startet historisk: ${currentChainStart.toLocaleDateString('nb-NO')}<br>Avsluttes: ${agEnd.toLocaleDateString('nb-NO')}.`;
            } else {
                agBox.innerHTML = `<strong>Arbeidsgiverperioden:</strong> Avsluttes ${agEnd.toLocaleDateString('nb-NO')}. Deretter tar NAV over.`;
            }
        } else { agBox.style.display = 'none'; }

        const faktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timer = faktor * 37.5;
        document.getElementById('result').innerText = timer.toLocaleString('no-NO', { minimumFractionDigits: 2 });
        const h = Math.floor(timer); const m = Math.round((timer - h) * 60);
        document.getElementById('resultTimeFormat').innerText = `(${h}t ${m}m å jobbe pr. uke)`;
        for(let i=0; i<7; i++) { document.getElementById(`fill-${i}`).style.height = (faktor * 100) + '%'; }

        localStorage.setItem('haga_fraværType', type);
        localStorage.setItem('haga_startDate', startVal);
        localStorage.setItem('haga_endDate', endVal);
    }

    function archivePeriod() {
        const entry = {
            id: Date.now(), type: document.getElementById('fraværType').value,
            start: document.getElementById('startDate').value, end: document.getElementById('endDate').value,
            grad: document.getElementById('sykemelding').value, stilling: document.getElementById('stilling').value,
            timeInfo: document.getElementById('resultTimeFormat').innerText
        };
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive.unshift(entry);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        checkTrends(); renderArchive(); calculate();
    }

    function loadFromArchive(id) {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const p = archive.find(x => x.id === id);
        if(p) {
            document.getElementById('fraværType').value = p.type;
            document.getElementById('startDate').value = p.start;
            document.getElementById('endDate').value = p.end;
            document.getElementById('sykemelding').value = p.grad;
            document.getElementById('stilling').value = p.stilling;
            calculate(); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function renderArchive() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        document.getElementById('archiveList').innerHTML = archive.map(item => `
            <div class="archive-item" onclick="loadFromArchive(${item.id})">
                <div style="font-weight:bold; color:var(--primary);">${item.type === 'Sykemelding' ? 'Sykemelding '+item.grad+'%' : item.type}</div>
                <div style="font-size:0.75rem;">${new Date(item.start).toLocaleDateString('nb-NO')} - ${new Date(item.end).toLocaleDateString('nb-NO')}</div>
                <button class="btn-delete-item" onclick="event.stopPropagation(); deleteItem(${item.id})">&times;</button>
            </div>
        `).join('');
    }

    function checkTrends() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const now = new Date(); const yr = now.getFullYear();
        const twelve = new Date(); twelve.setFullYear(now.getFullYear() - 1);
        const eg = archive.filter(p => p.type === 'Egenmelding' && new Date(p.start) > twelve).length;
        const sb = archive.filter(p => p.type === 'Sykt barn' && new Date(p.start).getFullYear() === yr)
            .reduce((t, p) => t + (Math.ceil((new Date(p.end) - new Date(p.start)) / 86400000) + 1), 0);
        const warn = document.getElementById('trendWarning');
        let txt = [];
        if (eg >= 4) txt.push(`<strong>OBS:</strong> 4 egenmeldinger siste 12 mnd.`);
        if (sb >= 10) txt.push(`<strong>OBS:</strong> ${sb}/10 dager sykt barn i år.`);
        warn.style.display = txt.length > 0 ? 'block' : 'none';
        warn.innerHTML = txt.join('<br>');
    }

    function deleteItem(id) {
        if(!confirm("Slette?")) return;
        let a = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        localStorage.setItem('haga_archive', JSON.stringify(a.filter(x => x.id !== id)));
        checkTrends(); renderArchive(); calculate();
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const a = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        doc.setTextColor(24, 150, 30); doc.text("FRAVÆRSRAPPORT", 105, 20, { align: "center" });
        doc.setTextColor(0, 0, 0); doc.setFontSize(10);
        doc.text(`Ansatt: ${document.getElementById('userName').value}`, 20, 35);
        const rows = a.map(i => [i.type, `${new Date(i.start).toLocaleDateString('nb-NO')} - ${new Date(i.end).toLocaleDateString('nb-NO')}`, i.stilling + "%", i.timeInfo.split(' å')[0]]);
        doc.autoTable({ startY: 45, head: [['Type', 'Periode', 'Stilling', 'Jobbe']], body: rows, headStyles: { fillColor: [24, 150, 30] } });
        doc.save("fraværsrapport.pdf");
    }
</script>
</body>
</html>
