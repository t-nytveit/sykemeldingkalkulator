<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sykemeldingskalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
            --light-grey: #f8f9fa;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; color: #444; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }

        /* Trend Varsel Boks */
        .trend-alert {
            background-color: #fff3cd;
            border-left: 5px solid var(--warning);
            color: #856404;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .result-box {
            background: #f1f9f1; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; border: 1px solid #d4ecd5;
        }
        .result-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

        .btn-main {
            background-color: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.9rem;
        }
        
        .btn-outline {
            background-color: white; color: var(--text-muted); border: 1px solid #ccc; padding: 8px;
            border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 0.8rem;
        }

        .archive-item {
            background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 10px;
            font-size: 0.8rem; position: relative;
        }

        .copyright { margin-top: 25px; text-align: center; font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <div id="trendWarning" class="trend-alert"></div>

    <h2>Kalkulator</h2>
    
    <div class="input-group">
        <label>Type fravær</label>
        <select id="fraværType" onchange="calculate()">
            <option value="Sykemelding">Sykemelding (Gradert/100%)</option>
            <option value="Egenmelding">Egenmelding (Egen sykdom)</option>
            <option value="Sykt barn">Egenmelding (Sykt barn)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()">
    </div>
    
    <div id="gradInputGroup" class="input-group">
        <label>Sykemeldingsprosent (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()">
    </div>

    <div class="section-title"><span>Periode</span></div>
    <div class="input-group"><label>Startdato</label><input type="date" id="startDate" oninput="calculate()"></div>
    <div class="input-group"><label>Sluttdato</label><input type="date" id="endDate" oninput="calculate()"></div>

    <div class="result-box">
        <div id="resultLabel" class="result-label">Timer å jobbe pr. uke:</div>
        <div id="result" class="result-value">0,00</div>
        <div id="resultTimeFormat" style="font-size: 0.85rem;">(0t 0m)</div>
    </div>

    <button class="btn-main" onclick="archivePeriod()">Arkiver denne perioden</button>
    <button class="btn-outline" onclick="exportToPDF()">Last ned PDF-rapport</button>

    <div class="archive-section">
        <div class="section-title">Arkiv</div>
        <div id="archiveList"></div>
    </div>

    <div class="copyright">&copy; <span id="year"></span> Thomas Nytveit</div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    window.onload = function() {
        const fields = ['stilling', 'sykemelding', 'startDate', 'endDate', 'fraværType'];
        fields.forEach(field => {
            const saved = localStorage.getItem('haga_' + field);
            if (saved) document.getElementById(field).value = saved;
        });
        checkTrends();
        renderArchive();
        calculate();
    };

    function calculate() {
        const type = document.getElementById('fraværType').value;
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = (type === 'Sykemelding') ? (parseFloat(document.getElementById('sykemelding').value) || 0) : 100;
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;

        // Skjul/vis grad-feltet
        document.getElementById('gradInputGroup').style.display = (type === 'Sykemelding') ? 'block' : 'none';

        const timerUke = (stilling / 100) * ((100 - sykemelding) / 100) * 37.5;
        document.getElementById('result').innerText = timerUke.toLocaleString('no-NO', { minimumFractionDigits: 2 });
        
        const h = Math.floor(timerUke);
        const m = Math.round((timerUke - h) * 60);
        document.getElementById('resultTimeFormat').innerText = `(${h}t ${m}m)`;

        localStorage.setItem('haga_fraværType', type);
        localStorage.setItem('haga_startDate', startVal);
        localStorage.setItem('haga_endDate', endVal);
    }

    function checkTrends() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const now = new Date();
        const twelveMonthsAgo = new Date();
        twelveMonthsAgo.setFullYear(now.getFullYear() - 1);
        
        const egenmeldinger = archive.filter(p => p.type === 'Egenmelding' && new Date(p.start) > twelveMonthsAgo);
        
        const syktBarnDager = archive
            .filter(p => p.type === 'Sykt barn' && new Date(p.start).getFullYear() === now.getFullYear())
            .reduce((total, p) => total + ((new Date(p.end) - new Date(p.start)) / 86400000 + 1), 0);

        const warningBox = document.getElementById('trendWarning');
        let warnings = [];

        if (egenmeldinger.length >= 4) warnings.push(`⚠️ 4 egenmeldinger brukt siste 12 mnd.`);
        if (syktBarnDager >= 10) warnings.push(`⚠️ 10 dager sykt barn brukt i år.`);

        if (warnings.length > 0) {
            warningBox.style.display = 'block';
            warningBox.innerHTML = warnings.join('<br>');
        } else {
            warningBox.style.display = 'none';
        }
    }

    function archivePeriod() {
        const entry = {
            id: Date.now(),
            type: document.getElementById('fraværType').value,
            start: document.getElementById('startDate').value,
            end: document.getElementById('endDate').value,
            grad: document.getElementById('sykemelding').value,
            timeInfo: document.getElementById('resultTimeFormat').innerText
        };
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive.unshift(entry);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        checkTrends();
        renderArchive();
    }

    function renderArchive() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        document.getElementById('archiveList').innerHTML = archive.map(item => `
            <div class="archive-item">
                <strong>${item.type}</strong> (${item.start} - ${item.end})<br>
                Jobbe: ${item.timeInfo}
                <button onclick="deleteItem(${item.id})" style="float:right; color:red; border:none; background:none; cursor:pointer;">Slett</button>
            </div>
        `).join('');
    }

    function deleteItem(id) {
        let archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive = archive.filter(p => p.id !== id);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        checkTrends();
        renderArchive();
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        
        doc.setFontSize(18);
        doc.text("Sykefraværsrapport", 20, 20);
        doc.setFontSize(10);
        doc.text(`Generert: ${new Date().toLocaleDateString('nb-NO')}`, 20, 30);
        
        let y = 40;
        archive.forEach((item, index) => {
            doc.text(`${index + 1}. ${item.type}: ${item.start} til ${item.end}`, 20, y);
            y += 7;
        });

        doc.save("fraværsrapport.pdf");
    }
</script>

</body>
</html>
