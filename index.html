<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sykemeldingskalkulator Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
            --light-grey: #f8f9fa;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .trend-alert {
            background-color: #fff3cd;
            border-left: 5px solid var(--warning);
            color: #856404;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            line-height: 1.4;
        }

        .section-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 15px 0 8px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }

        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-weight: 600; color: #444; font-size: 0.8rem; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }

        .result-box {
            background: #f1f9f1; padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; border: 1px solid #d4ecd5;
        }
        .result-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }

        .btn-main {
            background-color: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.95rem;
        }
        
        .btn-pdf {
            background-color: #333; color: white; border: none; padding: 10px;
            border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 0.85rem; font-weight: 600;
        }

        .archive-item {
            background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 8px;
            font-size: 0.8rem; cursor: pointer;
        }
        .archive-item:hover { background: #f9fdf9; }

        .copyright { margin-top: 25px; text-align: center; font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <div id="trendWarning" class="trend-alert"></div>

    <h2>Personalverktøy</h2>
    
    <div class="section-title">Brukerinformasjon</div>
    <div class="input-group">
        <label>Navn ansatt</label>
        <input type="text" id="userName" placeholder="Fullt navn" oninput="saveUserData()">
    </div>
    <div class="input-group">
        <label>Butikk / Avdeling</label>
        <input type="text" id="userStore" placeholder="KIWI XXXX" oninput="saveUserData()">
    </div>

    <div class="section-title">Fraværsdetaljer</div>
    <div class="input-group">
        <label>Type fravær</label>
        <select id="fraværType" onchange="calculate()">
            <option value="Sykemelding">Sykemelding (Gradert/100%)</option>
            <option value="Egenmelding">Egenmelding (Egen sykdom)</option>
            <option value="Sykt barn">Egenmelding (Sykt barn)</option>
        </select>
    </div>

    <div class="input-group" id="stillingGroup">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()">
    </div>
    
    <div id="gradInputGroup" class="input-group">
        <label>Sykemeldingsprosent (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()">
    </div>

    <div class="input-group"><label>Startdato</label><input type="date" id="startDate" oninput="calculate()"></div>
    <div class="input-group"><label>Sluttdato</label><input type="date" id="endDate" oninput="calculate()"></div>

    <div class="result-box">
        <div id="result" class="result-value">0,00</div>
        <div id="resultTimeFormat" style="font-size: 0.85rem; color: #444;">(0t 0m å jobbe pr. uke)</div>
    </div>

    <button class="btn-main" onclick="archivePeriod()">Arkiver periode</button>
    <button class="btn-pdf" onclick="exportToPDF()">Generer PDF for personalmappe</button>

    <div class="archive-section">
        <div class="section-title">Arkiv</div>
        <div id="archiveList"></div>
    </div>

    <div class="copyright">&copy; <span id="year"></span> Thomas Nytveit</div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    window.onload = function() {
        const fields = ['stilling', 'sykemelding', 'startDate', 'endDate', 'fraværType', 'userName', 'userStore'];
        fields.forEach(field => {
            const saved = localStorage.getItem('haga_' + field);
            if (saved) document.getElementById(field).value = saved;
        });
        checkTrends();
        renderArchive();
        calculate();
    };

    function saveUserData() {
        localStorage.setItem('haga_userName', document.getElementById('userName').value);
        localStorage.setItem('haga_userStore', document.getElementById('userStore').value);
    }

    function calculate() {
        const type = document.getElementById('fraværType').value;
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = (type === 'Sykemelding') ? (parseFloat(document.getElementById('sykemelding').value) || 0) : 100;
        
        document.getElementById('gradInputGroup').style.display = (type === 'Sykemelding') ? 'block' : 'none';
        
        const timerUke = (stilling / 100) * ((100 - sykemelding) / 100) * 37.5;
        document.getElementById('result').innerText = timerUke.toLocaleString('no-NO', { minimumFractionDigits: 2 });
        const h = Math.floor(timerUke);
        const m = Math.round((timerUke - h) * 60);
        document.getElementById('resultTimeFormat').innerText = `(${h}t ${m}m å jobbe pr. uke)`;

        localStorage.setItem('haga_fraværType', type);
        localStorage.setItem('haga_startDate', document.getElementById('startDate').value);
        localStorage.setItem('haga_endDate', document.getElementById('endDate').value);
    }

    function checkTrends() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const now = new Date();
        const twelveMonthsAgo = new Date();
        twelveMonthsAgo.setFullYear(now.getFullYear() - 1);
        
        const egenmeldinger = archive.filter(p => p.type === 'Egenmelding' && new Date(p.start) > twelveMonthsAgo);
        const syktBarnDager = archive
            .filter(p => p.type === 'Sykt barn' && new Date(p.start).getFullYear() === now.getFullYear())
            .reduce((total, p) => total + ((new Date(p.end) - new Date(p.start)) / 86400000 + 1), 0);

        const warningBox = document.getElementById('trendWarning');
        let warnings = [];
        if (egenmeldinger.length >= 4) warnings.push(`<strong>OBS:</strong> 4 egenmeldinger brukt siste 12 mnd.`);
        if (syktBarnDager >= 10) warnings.push(`<strong>OBS:</strong> ${syktBarnDager}/10 dager sykt barn brukt i år.`);

        warningBox.style.display = (warnings.length > 0) ? 'block' : 'none';
        warningBox.innerHTML = warnings.join('<br>');
    }

    function archivePeriod() {
        const entry = {
            id: Date.now(),
            type: document.getElementById('fraværType').value,
            start: document.getElementById('startDate').value,
            end: document.getElementById('endDate').value,
            grad: document.getElementById('sykemelding').value,
            stilling: document.getElementById('stilling').value,
            timeInfo: document.getElementById('resultTimeFormat').innerText
        };
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive.unshift(entry);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        checkTrends();
        renderArchive();
    }

    function renderArchive() {
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        document.getElementById('archiveList').innerHTML = archive.map(item => `
            <div class="archive-item">
                <div style="font-weight:bold; color:var(--primary);">${item.type}</div>
                <div style="font-size:0.75rem;">${new Date(item.start).toLocaleDateString('nb-NO')} - ${new Date(item.end).toLocaleDateString('nb-NO')}</div>
                <div style="font-size:0.7rem; color:#666;">Stillingsgrad: ${item.stilling}% | ${item.timeInfo}</div>
                <button onclick="deleteItem(${item.id})" style="position:absolute; right:10px; top:15px; color:red; border:none; background:none; cursor:pointer;">&times;</button>
            </div>
        `).join('');
    }

    function deleteItem(id) {
        if(!confirm("Slette perioden?")) return;
        let archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        archive = archive.filter(p => p.id !== id);
        localStorage.setItem('haga_archive', JSON.stringify(archive));
        checkTrends();
        renderArchive();
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const archive = JSON.parse(localStorage.getItem('haga_archive') || '[]');
        const name = document.getElementById('userName').value || "Ikke oppgitt";
        const store = document.getElementById('userStore').value || "Ikke oppgitt";

        // Overskrift
        doc.setFontSize(22);
        doc.setTextColor(24, 150, 30); // KIWI Grønn
        doc.text("FRAVÆRSRAPPORT", 105, 20, { align: "center" });
        
        // Info boks
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        doc.text(`Ansatt: ${name}`, 20, 35);
        doc.text(`Butikk: ${store}`, 20, 40);
        doc.text(`Dato generert: ${new Date().toLocaleDateString('nb-NO')}`, 20, 45);

        // Tabell-data
        const tableRows = archive.map(item => [
            item.type,
            `${new Date(item.start).toLocaleDateString('nb-NO')} - ${new Date(item.end).toLocaleDateString('nb-NO')}`,
            item.type === 'Sykemelding' ? item.grad + "%" : "100%",
            item.timeInfo.replace('(', '').replace(')', '')
        ]);

        doc.autoTable({
            startY: 55,
            head: [['Type', 'Periode', 'Grad', 'Arbeidstid']],
            body: tableRows,
            headStyles: { fillColor: [24, 150, 30] },
            theme: 'grid'
        });

        const finalY = doc.lastAutoTable.finalY + 20;
        doc.setFontSize(9);
        doc.setFont(undefined, 'italic');
        doc.text("Dette dokumentet er generert som grunnlag for oppfølgingsplan og dokumentasjon av fraværskvoter.", 20, finalY);

        doc.save(`Fravær_${name.replace(/\s+/g, '_')}.pdf`);
    }
</script>

</body>
</html>
